# lykn.pl site configuration
# Built with Cobalt (https://cobalt-org.github.io)

source: "."
destination: _site
ignore:
  - workbench
  - workbench/**/*
  - README.md
  - LICENSE
template_extensions:
  - md
  - liquid
  - html
include_drafts: false

syntax_highlight:
  enabled: false

site:
  title: "lykn"
  description: "Lisp Flavoured JavaScript — s-expression syntax compiling to clean, readable JS"
  base_url: "https://lykn.pl"

default:
  excerpt_separator: "\n\n"

pages:
  default: {}

posts:
  title: "Blog"
  description: "Updates from the lykn project"
  dir: posts
  drafts_dir: _drafts
  order: Desc
  rss: rss.xml
  default: {}
